<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NR Relic Simulator v11.0</title>
    <style>
        :root { --bg: #0f1115; --card: #1a1d23; --accent: #d4af37; --text: #e0e0e0; --hp: #ff4f4f; --atk: #4fafff; --element: #4fff8d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 600px; margin: 0 auto; padding-bottom: 320px; }
        .section { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .label { font-weight: bold; color: var(--accent); margin-bottom: 10px; display: block; border-left: 4px solid var(--accent); padding-left: 10px; }
        
        /* ステータス入力 */
        .base-input-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .base-input-grid div { display: flex; flex-direction: column; }
        .base-input-grid label { font-size: 0.65rem; color: #888; margin-bottom: 3px; }
        input[type="number"] { background: #12151a; color: white; border: 1px solid #555; padding: 8px; border-radius: 5px; font-size: 0.9rem; }

        .slot { background: #252a33; padding: 8px; border-radius: 8px; margin-bottom: 8px; border: 1px solid #444; }
        select { width: 100%; padding: 10px; background: #12151a; color: white; border: 1px solid #555; border-radius: 5px; cursor: pointer; font-size: 0.9rem; }
        
        /* フッター（レスポンシブ対応） */
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 17, 21, 0.98); border-top: 3px solid var(--accent); padding: 12px; backdrop-filter: blur(10px); z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        
        /* 結果グリッド：スマホでは縦、PCでは横 */
        .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        @media (max-width: 500px) {
            .result-grid { grid-template-columns: 1fr; gap: 5px; }
            .res-box { border-right: none !important; border-bottom: 1px solid #333; padding-bottom: 5px; display: flex; justify-content: space-between; align-items: center; }
            .container { padding-bottom: 400px; } /* スマホ時はフッターが伸びるので余白を増やす */
        }

        .res-box { text-align: center; border-right: 1px solid #333; }
        .res-box:last-child { border-right: none; }
        .res-val { font-size: 1.3rem; font-weight: bold; }
        .res-percent { font-size: 0.8rem; font-weight: bold; color: var(--accent); }
        .res-base { font-size: 0.65rem; color: #777; }
        
        .formula-container { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 8px; font-size: 0.6rem; color: #aaa; line-height: 1.3; max-height: 100px; overflow-y: auto; }
        .formula-line { margin-bottom: 3px; border-bottom: 1px solid #222; padding-bottom: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <span class="label">基礎ステータス ⚙️</span>
        <div class="base-input-grid">
            <div><label>基礎HP</label><input type="number" id="base-hp" value="1000" oninput="calc()"></div>
            <div><label>物理攻撃</label><input type="number" id="base-atk" value="300" oninput="calc()"></div>
            <div><label>属性攻撃</label><input type="number" id="base-ele" value="20" oninput="calc()"></div>
        </div>
    </div>

    <div class="section">
        <span class="label">撃破ボーナス 🏹 (最大10)</span>
        <div style="display:flex; gap:10px;">
            <div style="flex:1;"><label style="font-size:0
