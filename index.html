<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NR RELIC SIM - FULL DATA v7.1</title>
    <style>
        :root { --bg: #0d0d0f; --card: #1c1c1e; --accent: #c1a35f; --text: #f0f0f0; --bad: #ff4d4d; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; font-size: 13px; }
        .container { max-width: 500px; margin: 0 auto; padding-bottom: 180px; }
        h1 { font-size: 1rem; text-align: center; color: var(--accent); margin: 5px 0 10px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        .section-title { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin: 15px 0 5px; border-left: 3px solid var(--accent); padding-left: 8px; display: block;}
        .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .slot-box { background: var(--card); border-radius: 8px; padding: 8px; border: 1px solid #333; min-height: 85px; display: flex; flex-direction: column; }
        select { width: 100%; height: 38px; background: #2c2c2e; color: white; border: 1px solid #444; border-radius: 4px; font-size: 0.8rem; outline: none; }
        .info-text { font-size: 0.55rem; color: #888; margin-top: 5px; line-height: 1.2; flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 15, 20, 0.98); border-top: 2px solid var(--accent); padding: 15px 20px 25px; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        .total-row { display: flex; justify-content: space-between; align-items: center; }
        .total-num { font-size: 2.2rem; font-weight: bold; color: var(--accent); font-family: monospace; }
        .total-percent { font-size: 1rem; color: #ff5e5e; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Relic Simulator Full</h1>

    <div id="app">
        <span class="section-title">NORMAL RELICS (3 Slots)</span>
        <div id="n-slots" class="slot-grid"></div>

        <span class="section-title" style="color:#b19cd9;">DEEP RELICS (10 Slots)</span>
        <div id="d-slots" class="slot-grid"></div>
    </div>
</div>

<div class="footer">
    <div class="total-row">
        <div>
            <span style="font-size:0.7rem; color:#888;">TOTAL MULTIPLIER</span><br>
            <span id="res-pct" class="total-percent">+0.0%</span>
        </div>
        <div id="res-val" class="total-num">1.000</div>
    </div>
</div>

<script>
// --- スプレッドシート（CSV）から全抽出したデータ ---
const DATA_NORMAL = [
    { n: "最大HP上昇", e: "1.1倍", s: "✕" },
    { n: "最大FP上昇", e: "1.15倍", s: "✕" },
    { n: "最大スタミナ上昇", e: "1.12倍", s: "✕" },
    { n: "生命力上昇", e: "4%/5%/6%/10.5%/12%", s: "◯" },
    { n: "精神力上昇", e: "4%/5%/6%/10.5%/12%", s: "◯" },
    { n: "持久力上昇", e: "4%/5%/6%/10.5%/12%", s: "◯" },
    { n: "筋力上昇", e: "4%/5%/6%/10.5%/12%", s: "◯" },
    { n: "技量上昇", e: "4%/5%/6%/10.5%/12%", s: "◯" },
    { n: "知力上昇", e: "4%/5%/6%/10.5%/12%", s: "◯" },
    { n: "信仰上昇", e: "4%/5%/6%/10.5%/12%", s: "◯" },
    { n: "物理攻撃力上昇", e: "4%/5%/6%/10.5%/12%", s: "✕" },
    { n: "魔力攻撃力上昇", e: "4%/5%/6%/10.5%/12%", s: "✕" },
    { n: "火属性攻撃力上昇", e: "4%/5%/6%/10.5%/12%", s: "✕" },
    { n: "雷属性攻撃力上昇", e: "4%/5%/6%/10.5%/12%", s: "✕" },
    { n: "聖属性攻撃力上昇", e: "4%/5%/6%/10.5%/12%", s: "✕" },
    { n: "致命の一撃の威力上昇", e: "1.15倍", s: "✕" },
    { n: "ガード強度上昇", e: "1.1倍", s: "✕" },
    { n: "強靭度上昇", e: "1.15倍", s: "✕" },
    { n: "属性痕:魔術の地", e: "1.15倍", s: "✕" },
    { n: "執行者:スキル中攻撃", e: "1.35倍", s: "✕" },
    { n: "味方バフ:物理", e: "1.2倍", s: "✕" },
    { n: "味方バフ:属性", e: "1.15倍", s: "✕" },
    { n: "咆哮:HP回復", e: "1.15倍(回復量)", s: "✕" },
    { n: "物理攻撃(通常)", e: "1.1倍", s: "✕" },
    { n: "アーツ発動時:物理上昇", e: "1.16倍", s: "✕" },
    { n: "アーツ発動時:最大HP上昇", e: "1.5倍", s: "✕" }
];

const DATA_DEEP = [
    { n: "最大HP上昇", e: "1.1倍", s: "◯", b: "被ダメージ+10%" },
    { n: "最大FP上昇", e: "1.15倍", s: "◯", b: "被ダメージ+15%" },
    { n: "最大スタミナ上昇", e: "1.12倍", s: "◯", b: "被ダメージ+12%" },
    { n: "強靭度上昇+3", e: "1.25倍", s: "◯", b: "なし" },
    { n: "小砦:取得ルーン増加", e: "1.055倍", s: "✕", b: "なし" },
    { n: "大教会:最大HP上昇", e: "1.05倍", s: "✕", b: "なし" },
    { n: "大野営地:最大スタミナ", e: "1.06倍", s: "✕", b: "なし" },
    { n: "物理攻撃力上昇(深層)", e: "10%/12%/14%/18%/22%", s: "◯", b: "最大HP-10%" },
    { n: "属性攻撃力上昇(深層)", e: "10%/12%/14%/18%/22%", s: "◯", b: "最大HP-10%" },
    { n: "全耐性上昇", e: "1.15倍", s: "◯", b: "なし" }
];

// --- 補助関数: 文字列から倍率数値を抽出 ---
function parseMult(txt) {
    if(!txt) return 1.0;
    // 全角を半角に
    const t = txt.replace(/[０-９％倍]/g, s => {
        return {'％':'%','倍':'倍','０':'0','１':'1','２':'2','３':'3','４':'4','５':'5','６':'6','７':'7','８':'8','９':'9'}[s] || s;
    });
    const m = t.match(/(\d+\.?\d*)(%|倍)/);
    if(!m) return 1.0;
    return m[2] === "%" ? 1 + (parseFloat(m[1])/100) : parseFloat(m[1]);
}

// --- 分割・展開ロジック ---
function expand(list) {
    let res = [];
    list.forEach(item => {
        if (item.e.includes("/")) {
            const vals = item.e.split("/");
            vals.forEach((v, i) => {
                res.push({ name: item.n + "+" + i, effect: v, stack: item.s, bad: item.b });
            });
        } else {
            res.push({ name: item.n, effect: item.e, stack: item.s, bad: item.b });
        }
    });
    return res;
}

const nFinal = expand(DATA_NORMAL);
const dFinal = expand(DATA_DEEP);

function buildSlot(parent, list) {
    const box = document.createElement('div');
    box.className = 'slot-box';
    const sel = document.createElement('select');
    sel.className = 'relic-sel';
    sel.appendChild(new Option("---", "1.0"));
    
    list.forEach(r => {
        const val = parseMult(r.effect);
        const opt = new Option(r.name, val);
        opt.dataset.stack = r.stack;
        opt.dataset.eff = r.effect;
        opt.dataset.bad = r.bad || "";
        sel.appendChild(opt);
    });

    sel.onchange = () => {
        const o = sel.options[sel.selectedIndex];
        const info = box.querySelector('.info-text');
        if(o.text === "---") {
            info.innerText = "";
        } else {
            info.innerText = o.dataset.eff + (o.dataset.bad ? "\n⚠ " + o.dataset.bad : "");
        }
        calc();
    };

    box.innerHTML = `<div class="info-text"></div>`;
    box.prepend(sel);
    parent.appendChild(box);
}

function calc() {
    let total = 1.0;
    let used = new Set();
    document.querySelectorAll('.relic-sel').forEach(s => {
        const o = s.options[s.selectedIndex];
        if (o.text === "---") return;
        
        // 重複チェック (✕印のみ)
        if (o.dataset.stack === "✕") {
            if (used.has(o.text.split("+")[0])) return; // 名称の基本部分でチェック
            used.add(o.text.split("+")[0]);
        }
        total *= parseFloat(o.value);
    });
    document.getElementById('res-val').innerText = total.toFixed(3);
    document.getElementById('res-pct').innerText = "+" + ((total - 1) * 100).toFixed(1) + "%";
}

// 実行
for(let i=0; i<3; i++) buildSlot(document.getElementById('n-slots'), nFinal);
for(let i=0; i<10; i++) buildSlot(document.getElementById('d-slots'), dFinal);
calc();

</script>
</body>
</html>
