<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NR RELIC SIM v6.0</title>
    <style>
        :root { --bg: #0d0d0f; --card: #1c1c1e; --accent: #c1a35f; --deep: #8a2be2; --text: #f0f0f0; --bad: #ff4d4d; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 480px; margin: 0 auto; padding-bottom: 200px; }
        h1 { font-size: 1.1rem; text-align: center; color: var(--accent); margin: 10px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .section-title { font-size: 0.75rem; color: var(--accent); font-weight: bold; margin: 15px 0 8px 5px; display: block; border-left: 3px solid var(--accent); padding-left: 8px; }
        .section-title.deep { color: #b19cd9; border-left-color: #b19cd9; }
        .slot-box { background: var(--card); border-radius: 10px; padding: 10px; margin-bottom: 8px; border: 1px solid #333; }
        select { width: 100%; height: 40px; background: #2c2c2e; color: white; border: 1px solid #444; border-radius: 6px; font-size: 0.85rem; outline: none; }
        .info-row { font-size: 0.65rem; color: #888; margin-top: 6px; display: flex; justify-content: space-between; }
        .bad-text { color: var(--bad); font-weight: bold; }
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 15, 20, 0.96); backdrop-filter: blur(8px); border-top: 2px solid var(--accent); padding: 15px 20px 25px; z-index: 100; }
        .res-flex { display: flex; justify-content: space-between; align-items: center; }
        .total-val { font-size: 2.2rem; font-weight: bold; color: var(--accent); }
        .percent-val { font-size: 0.85rem; color: #ff5e5e; font-weight: bold; }
        .warn-tag { background: var(--bad); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; display: none; margin-left: 5px; }
        #loading { text-align: center; margin-top: 50px; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <div id="loading">📡 スプシの「+1~4」をバラし中...</div>
    <div id="app-main" style="display:none;">
        <h1>Relic Simulator</h1>
        <span class="section-title">通常遺物 (3スロット)</span>
        <div id="normal-area"></div>
        <span class="section-title deep">深層遺物 (枠を増やしました)</span>
        <div id="deep-area"></div>
    </div>
</div>

<div class="footer-bar">
    <div class="res-flex">
        <div>
            <span style="font-size:0.7rem; color:#888;">DAMAGE MULTIPLIER</span><span id="warn" class="warn-tag">DUP ERR</span><br>
            <span id="percent-display" class="percent-val">+0.0% UP</span>
        </div>
        <div id="total-display" class="total-val">1.000</div>
    </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxo63D25mvm9EVV0zoytBrKobuC6j4k5wI--nwgvi_rvkXJ_RhL9r2lyXYe8zhCvg2l/exec";

async function startApp() {
    try {
        const res = await fetch(GAS_URL, { redirect: 'follow' });
        const db = await res.json();
        
        // データを「+1~4」などの形式から分割展開する
        const processedNormal = expandRelics(db.normal);
        const processedDeep = expandRelics(db.deep);

        document.getElementById('loading').style.display = 'none';
        document.getElementById('app-main').style.display = 'block';
        
        // スロット生成（通常3、深層6に増加）
        for(let i=0; i<3; i++) buildSlot(document.getElementById('normal-area'), processedNormal);
        for(let i=0; i<6; i++) buildSlot(document.getElementById('deep-area'), processedDeep);
        
        runCalc();
    } catch(e) {
        document.getElementById('loading').innerHTML = "❌ 同期失敗";
    }
}

// 物理上昇+1~4 などのデータを分割してリスト化する関数
function expandRelics(list) {
    let newList = [];
    list.forEach(item => {
        // "名称+1~4" かつ 詳細に "/" が含まれる場合を判定
        if (item.name.includes("~") && item.effect.includes("/")) {
            const rangeMatch = item.name.match(/\+(\d+)~(\d+)/);
            const perValues = item.effect.split("/"); // "+4%/+5%..." を分ける
            
            if (rangeMatch) {
                const start = 0; // +0から作成
                const end = parseInt(rangeMatch[2]);
                const baseName = item.name.split("+")[0];

                for (let i = start; i <= end; i++) {
                    if (perValues[i]) {
                        newList.push({
                            name: `${baseName}+${i}`,
                            effect: perValues[i].trim(),
                            stack: item.stack,
                            bad: item.bad
                        });
                    }
                }
                return; // 元の結合データは追加しない
            }
        }
        newList.push(item);
    });
    return newList;
}

function buildSlot(parent, list) {
    const box = document.createElement('div');
    box.className = 'slot-box';
    const sel = document.createElement('select');
    sel.className = 'relic-select';
    sel.onchange = (e) => {
        const o = e.target.options[e.target.selectedIndex];
        box.querySelector('.desc').innerText = o.dataset.eff || "";
        box.querySelector('.bad').innerText = o.dataset.bad && o.dataset.bad !== "undefined" ? " / " + o.dataset.bad : "";
        runCalc();
    };
    sel.appendChild(new Option("--- 未装備 ---", "1.0"));
    list.forEach(item => {
        const val = parseValue(item.effect);
        const opt = new Option(item.name, val);
        opt.dataset.stack = item.stack;
        opt.dataset.eff = item.effect;
        opt.dataset.bad = item.bad;
        sel.appendChild(opt);
    });
    box.innerHTML = `<div class="info-row"><span class="desc"></span><span class="bad bad-text"></span></div>`;
    box.prepend(sel);
    parent.appendChild(box);
}

function parseValue(text) {
    const m = text.match(/(\d+\.?\d*)(%|倍)/);
    if(!m) return 1.0;
    return m[2] === "%" ? 1 + (parseFloat(m[1])/100) : parseFloat(m[1]);
}

function runCalc() {
    let mult = 1.0;
    let used = new Set();
    let isDup = false;
    document.querySelectorAll('.relic-select').forEach(s => {
        const o = s.options[s.selectedIndex];
        if(o.text.includes("---")) return;
        if(o.dataset.stack === "✕") {
            if(used.has(o.text)) { isDup = true; return; }
            used.add(o.text);
        }
        mult *= parseFloat(o.value);
    });
    document.getElementById('total-display').innerText = mult.toFixed(3);
    document.getElementById('percent-display').innerText = "+" + ((mult - 1)*100).toFixed(1) + "% UP";
    document.getElementById('warn').style.display = isDup ? "inline-block" : "none";
}
startApp();
</script>
</body>
</html>
